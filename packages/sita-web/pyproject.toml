[project]
name = "sita-web"
version = "0.1.0"
description = "Flask web interface and CLI for SITA natural-abundance correction"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Cian Monnin", email = "cianmonnin@gmail.com" }]
keywords = ["metabolomics", "mass-spectrometry", "isotope", "GC-MS", "13C", "flask"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Topic :: Scientific/Engineering :: Chemistry",
    "Framework :: Flask",
    "Environment :: Web Environment",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    "sita-core>=0.1.0",
    "flask>=3.0",
    "gunicorn>=21.2",
]

[project.urls]
Homepage = "https://github.com/CMonnin/SITA"
Source = "https://github.com/CMonnin/SITA"
Issues = "https://github.com/CMonnin/SITA/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sita_web"]


[tool.uv.sources]
sita-core = { workspace = true }
