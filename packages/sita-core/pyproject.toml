[project]
name = "sita-core"
version = "0.1.0"
description = "Natural-abundance correction for GC-MS mass distribution vectors from 13C stable-isotope tracer experiments"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Cian Monnin", email = "cianmonnin@gmail.com" }]
keywords = ["metabolomics", "mass-spectrometry", "isotope", "GC-MS", "13C", "flux-analysis"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Topic :: Scientific/Engineering :: Chemistry",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    "numpy>=1.26",
]

[project.urls]
Homepage = "https://github.com/CMonnin/SITA"
Source = "https://github.com/CMonnin/SITA"
Issues = "https://github.com/CMonnin/SITA/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sita_core"]
